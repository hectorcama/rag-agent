name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  setup:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python 3.12
      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Display Python version
      - name: Display Python version
        run: python --version

      # Install Poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      # Ensure Poetry is in PATH for Windows
      - name: Add Poetry to PATH
        if: runner.os == 'Windows'
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Configure Poetry (always run to ensure settings)
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true

      # Display Poetry version
      - name: Display Poetry version
        run: poetry --version

      # Show Poetry config to verify venv location
      - name: Show Poetry configuration
        run: poetry config --list

      # Load cached dependencies
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-

      # Install dependencies with Poetry
      - name: Install project dependencies
        run: poetry install --with dev --no-interaction

      # Verify venv location
      - name: Show virtual environment location
        run: poetry env info --path

      # Display installed packages
      - name: Show Poetry packages
        run: poetry show

  test:
    runs-on: windows-latest
    needs: setup # waits for setup to complete successfully

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      # Restore cached venv from setup job
      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Run tests
        run: poetry run pytest -v -s --tb=long
